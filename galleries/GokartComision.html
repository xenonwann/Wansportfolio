<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Gallery</title>
<link rel="stylesheet" href="gallery.css">
</head>
<body>

<header class="gallery-hero">
    <h1>Go-Kart commision</h1>
    <p>Visual breakdown of assests assembled</p>
</header>

<section class="gallery-container">

    <div class="gallery-item">
        <img src="Images/Screenshot (263).png" alt="Go cart">
        <div class="caption">
            <h3>Front</h3>
        </div>
    </div>

    <div class="gallery-item">
        <img src="Images/Screenshot (264).png" alt="Go kart top">
        <div class="caption">
            <h3>Top</h3>
        </div>
    </div>

    <div class="gallery-item">
        <img src="Images/Screenshot (265).png" alt="Go Kart rear">
        <div class="caption">
            <h3>Rear</h3>
        </div>
    </div>

    <div class="gallery-item">
        <img src="Images/Screenshot (266).png" alt="Go Kart side">
        <div class="caption">
            <h3>Side profile</h3>
        </div>
    </div>

    <div class="gallery-item">
        <img src="Images/Screenshot (267).png" alt="Full pic">
        <div class="caption">
            <h3>Full picture</h3>
            <p>Showing all the models which include a go kart and 3 track segments</p>
        </div>
    </div>

    <div class="gallery-item wide-2">
        <img src="Images/Discordprofile.jpg" alt="Customer">
        <div class="caption">
            <h3>Supporter</h3>
            <p>The person who requested the models</p>
        </div>
    </div>

</section>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <img class="lightbox-img" id="lightbox-img">
</div>

<script src="gallery.js"></script>
</body>
</html>
